<svg
    viewBox="0 0 40 40"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    width="40"
    height="40"
>
    <defs>
        <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#00E5FF" stopOpacity="1" />
            <stop offset="100%" stopColor="#00E599" stopOpacity="1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="0.8" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Outer hexagon frame with gradient -->
    <path
        d="M20 2L34.6410 10.5V27.5L20 36L5.35898 27.5V10.5L20 2Z"
        stroke="url(#glowGradient)"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        filter="url(#glow)"
    />

    <!-- Inner C shape with enhanced styling -->
    <path
        d="M26 12L25 11H16L12 15V25L16 29H25L26 28"
        stroke="url(#glowGradient)"
        strokeWidth="2.5"
        strokeLinecap="round"
        strokeLinejoin="round"
        filter="url(#glow)"
    />

    <!-- Market making spreads - enhanced with gradients -->
    <line
        x1="18"
        y1="16"
        x2="15"
        y2="16"
        stroke="#00E599"
        strokeWidth="1.5"
        strokeLinecap="round"
        filter="url(#glow)"
    />
    <line
        x1="18"
        y1="20"
        x2="14"
        y2="20"
        stroke="#00E5FF"
        strokeWidth="1.5"
        strokeLinecap="round"
        filter="url(#glow)"
    />
    <line
        x1="18"
        y1="24"
        x2="15"
        y2="24"
        stroke="#FF6B6B"
        strokeWidth="1.5"
        strokeLinecap="round"
        filter="url(#glow)"
    />

    <!-- Sharp accent corners with enhanced glow -->
    <circle cx="26" cy="12" r="1.5" fill="url(#glowGradient)" filter="url(#glow)" />
    <circle cx="26" cy="28" r="1.5" fill="url(#glowGradient)" filter="url(#glow)" />

    <!-- Additional accent points for polish -->
    <circle cx="14" cy="15" r="0.8" fill="#00E5FF" opacity="0.6" filter="url(#glow)" />
    <circle cx="14" cy="25" r="0.8" fill="#00E5FF" opacity="0.6" filter="url(#glow)" />
</svg>
